<script>
// ========================
// 🔐 AMBIL & DECODE URL
// ========================
const params = new URLSearchParams(window.location.search);
const encoded = params.get("url");

let real = "";

try{
    real = atob(encoded);
}catch(e){
    real = "";
}

// ========================
// 🎯 ELEMENT
// ========================
const btn = document.getElementById("realBtn");
const countEl = document.getElementById("count");

// ========================
// 🔥 RANDOM TIME FUNCTION
// ========================
function getRandomTime(min, max){
    return Math.floor(Math.random() * (max - min + 1)) + min;
}

// ========================
// 🤖 ANTI BOT DETECT
// ========================
let t = getRandomTime(6, 10);

if(navigator.webdriver){
    t = 25; // bot delay lebih lama
}

// tampilkan angka awal
countEl.innerText = t;

// ========================
// ⏳ RANDOM DELAY START
// ========================
setTimeout(startTimer, getRandomTime(1000, 3000));

// ========================
// 🚀 TIMER FUNCTION
// ========================
function startTimer(){

    const timer = setInterval(()=>{
        t--;
        countEl.innerText = t;

        if(t <= 0){
            clearInterval(timer);

            btn.style.display = "block";
            countEl.style.display = "none";

            btn.href = real;

            // 🔥 klik = buka iklan + download
            btn.addEventListener("click", function(){

                window.open("https://crn77.com/4/10180786", "_blank");

            });

        }

    },1000);
}

</script>
