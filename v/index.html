*{box-sizing:border-box}

html,body{

body{

/* HEADER */
.main-header{
    width:100%;
    padding:12px 0;
    background:#fff;
    border-bottom:1px solid #e5e7eb;
    position:sticky;
    top:0;
    z-index:100;
}

.header-container{
    width:100%;
    max-width:1170px;
    margin:auto;
    padding:0 15px;
    display:flex;
    align-items:center;
}

.header-left{
    display:flex;
    align-items:center;
    gap:12px;
}

.header-title{
    font-weight:700;
    font-size:28px;
}

.header-upload-btn{
    background:#f3f4f6;
    color:#111;
    text-decoration:none;
    padding:9px 16px;
    border-radius:16px;
    font-size:14px;
    font-weight:600;
}

/* PLAYER */
.video-player-wrap{
    width:100%;
    padding-top:20px;
    display:flex;
    flex-direction:column;
    align-items:center;
}

.player-row{
    display:flex;
    justify-content:center;
    width:100%;
}

.video-box{
    width:800px;
    max-width:90vw;
    aspect-ratio:16/9;
    background:#fff;
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 2px 16px rgba(0,0,0,.08);
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
}

.video-box video{
    width:100%;
    height:100%;
    object-fit:contain;
    display:block;
    background:#fff;
}


.play-overlay{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:80px;
    height:80px;
    background:rgba(0,0,0,.6);
    border-radius:50%;
    display:none;
    align-items:center;
    justify-content:center;
    z-index:50;
    pointer-events:none;
}

.play-overlay svg{
    width:40px;
    height:40px;
    fill:#1e90ff;
}

/* ERROR */
#video-error{
    display:none;
    text-align:center;
    padding:20px;
    color:#d00;
    font-weight:600;
}

/* CTA */
.video-actions{
    width:100%;
    display:flex;
    justify-content:center;
    padding:18px 0 10px;
}

.download-btn{
    position:relative;
    overflow:hidden;
    background:linear-gradient(90deg,#667eea,#764ba2);
    color:#fff;
    border:none;
    border-radius:24px;
    padding:12px 24px;
    font-size:18px;
    font-weight:500;
    text-decoration:none;
    display:inline-flex;
    align-items:center;
    box-shadow:0 4px 14px rgba(102,126,234,.39);
    transition:transform .2s ease, box-shadow .2s ease;
    animation:pulseBtn 2s infinite;
}

.download-btn i{
    margin-right:8px;
}

.download-btn::before{
    content:"";
    position:absolute;
    top:0;
    left:-75%;
    width:50%;
    height:100%;
    background:rgba(255,255,255,.45);
    transform:skewX(-25deg);
    animation:shineMove 2.2s infinite;
}

.download-btn:hover{
    transform:translateY(-2px) scale(1.02);
    box-shadow:0 6px 18px rgba(102,126,234,.45);
}

@keyframes shineMove{
    0%{left:-75%}
    100%{left:130%}
}

@keyframes pulseBtn{
    0%,100%{
        transform:scale(1);
    }
    50%{
        transform:scale(1.02);
    }
}

footer{
    margin-top:20px;
    text-align:center;
    color:gray;
    padding-bottom:30px;
}

footer a{
    text-decoration:none;
    color:gray;
}

/* MOBILE */
@media(max-width:768px){
    .video-box{
        width:calc(100vw - 20px);
        border-radius:8px;
        box-shadow:none;
    }

    .header-title{
        font-size:24px;
    }
}

<script>
const video = document.getElementById("video");
const videoError = document.getElementById("video-error");
const videoActions = document.querySelector(".video-actions");

const params = new URLSearchParams(window.location.search);
const id = params.get("id") || "t4qLw89X1";

// =========================
// DETECT EXTERNAL SOURCE
// =========================
function getExternalSource(input) {
    if (!input) return null;

    try {
        input = decodeURIComponent(input);

        // =========================
        // 🔥 CASE 1: FULL URL
        // =========================

        // xfollow full url
        if (input.includes("xxxfollow.com")) {
            const match = input.match(/post_public\/(.+)/);
            if (match) return "https://www.xxxfollow.com/media/fans/post_public/" + match[1];
        }

        // xfree full url
        if (input.includes("xfree.com")) {
            const match = input.match(/xfree-prod\/(.+)/);
            if (match) return "https://cdn.xfree.com/xfree-prod/" + match[1];
        }

        // =========================
        // 🔥 CASE 2: PATH LANGSUNG (INI YANG LO BUTUH)
        // =========================

        // xfollow style (support tanpa .mp4)
		if (/^\d+\/\d+\/\d+(\.mp4)?$/.test(input)) {
		if (!input.endsWith(".mp4")) {
        input += ".mp4";
		}
		return "https://www.xxxfollow.com/media/fans/post_public/" + input;
		}

        // xfree style (support tanpa .mp4)
		if (/^[a-z0-9]\/[a-z0-9]\/[a-z0-9]\/[^?]+\/full(\.mp4)?$/i.test(input)) {
    if (!input.toLowerCase().endsWith(".mp4")) {
        input += ".mp4";
    }
    return "https://cdn.xfree.com/xfree-prod/" + input;
}
        return null;

    } catch (e) {
        return null;
    }
}

const isMobile = /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|WPDesktop/i.test(navigator.userAgent);

const cdnHost = isMobile
    ? "https://cdn2.videy.co/"
    : "https://cdn.videy.co/";

const externalSrc = getExternalSource(id);

function loadVideo(src){
    video.src = src;
    video.load();
}

// =========================
// PRIORITAS EXTERNAL SOURCE
// =========================
if (externalSrc) {
    loadVideo(externalSrc);
} else {
    const base = cdnHost + id;
    loadVideo(base + ".mp4");
}

video.onerror = function () {

    // ❌ kalau external → jangan retry .mov
    if (externalSrc) {
        video.style.display = "none";
        videoError.style.display = "block";
        videoActions.style.display = "none";

        if(clickLayer){
            clickLayer.style.display = "none";
        }
        return;
    }

    // ✅ hanya untuk videy
    if (!video.dataset.triedMov) {
        video.dataset.triedMov = "1";
        loadVideo(base + ".mov");
    } else {
        video.style.display = "none";
        videoError.style.display = "block";
        videoActions.style.display = "none";

        if(clickLayer){
            clickLayer.style.display = "none";
        }
    }
};

video.oncanplay = function () {
    videoError.style.display = "none";
    video.style.display = "block";
    videoActions.style.display = "flex";
};

</script>
